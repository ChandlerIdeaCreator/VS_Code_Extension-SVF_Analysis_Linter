<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">SVF taint flow tree demo</title>
  <desc id="desc">A stylized screenshot showing the Taint Flows view and synchronized editor navigation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09131B"/>
      <stop offset="100%" stop-color="#182734"/>
    </linearGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15222D"/>
      <stop offset="100%" stop-color="#0F1922"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="820" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1360" height="62" rx="18" fill="#0E1821" stroke="#223343"/>
  <rect x="152" y="34" width="430" height="30" rx="14" fill="#1E313F"/>
  <text x="177" y="54" font-size="18" fill="#97B6C7" font-family="Segoe UI, Arial, sans-serif">SVF ANALYSIS: TAINT FLOWS</text>
  <rect x="24" y="98" width="360" height="698" rx="20" fill="#0D1720" stroke="#223343"/>
  <text x="52" y="138" font-size="24" fill="#DDEAF0" font-family="Segoe UI, Arial, sans-serif">SVF ANALYSIS: TAINT FLOWS</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="48" y="196" font-size="30" fill="#7FB3D5">⌄</text>
    <text x="78" y="196" font-size="32" fill="#DCEBF3">Taint Flow 1 (argv -&gt; system)</text>
    <circle cx="76" cy="246" r="8" fill="#84DCC6"/>
    <text x="100" y="253" font-size="25" fill="#DDEAF0">Source: line 10</text>
    <text x="290" y="253" font-size="21" fill="#8CA4B2">user input from argv</text>
    <text x="74" y="300" font-size="26" fill="#8CA4B2">→</text>
    <text x="100" y="300" font-size="25" fill="#DDEAF0">Propagation: line 12</text>
    <text x="352" y="300" font-size="21" fill="#8CA4B2">assigned to local buffer</text>
    <text x="74" y="354" font-size="26" fill="#8CA4B2">→</text>
    <text x="100" y="354" font-size="25" fill="#DDEAF0">Propagation: line 14</text>
    <text x="352" y="354" font-size="21" fill="#8CA4B2">passed to helper()</text>
    <circle cx="76" cy="408" r="8" fill="#F07178"/>
    <text x="100" y="415" font-size="25" fill="#DDEAF0">Sink: line 18</text>
    <text x="248" y="415" font-size="21" fill="#F2A6AA">system(buffer)</text>
    <text x="48" y="494" font-size="30" fill="#7FB3D5">⌄</text>
    <text x="78" y="494" font-size="32" fill="#DCEBF3">Taint Flow 2 (recv -&gt; strcpy)</text>
    <circle cx="76" cy="544" r="8" fill="#84DCC6"/>
    <text x="100" y="551" font-size="25" fill="#DDEAF0">Source: line 23</text>
    <text x="294" y="551" font-size="21" fill="#8CA4B2">recv() from socket</text>
    <text x="74" y="604" font-size="26" fill="#8CA4B2">→</text>
    <text x="100" y="604" font-size="25" fill="#DDEAF0">Propagation: line 25</text>
    <text x="352" y="604" font-size="21" fill="#8CA4B2">stored in struct field</text>
    <circle cx="76" cy="664" r="8" fill="#F07178"/>
    <text x="100" y="671" font-size="25" fill="#DDEAF0">Sink: line 30</text>
    <text x="248" y="671" font-size="21" fill="#F2A6AA">strcpy() overflow risk</text>
  </g>
  <rect x="404" y="98" width="972" height="698" rx="20" fill="url(#editor)" stroke="#223343"/>
  <rect x="430" y="122" width="130" height="36" rx="10" fill="#193648"/>
  <text x="461" y="147" font-size="20" fill="#8ED1FC" font-family="Consolas, monospace">test.c</text>
  <g font-family="Consolas, monospace" font-size="24">
    <text x="468" y="220" fill="#82AAFF">int</text>
    <text x="519" y="220" fill="#F6C177">main</text>
    <text x="585" y="220" fill="#D6DEEB">(int argc, char *argv[]) {</text>
    <text x="510" y="278" fill="#D6DEEB">helper(local_buffer);</text>
    <text x="1005" y="278" fill="#7F95A2">Propagation 2</text>
    <text x="510" y="336" fill="#D6DEEB">process_network(0);</text>
    <text x="510" y="410" fill="#82AAFF">void</text>
    <text x="568" y="410" fill="#F6C177">helper</text>
    <text x="645" y="410" fill="#D6DEEB">(char *buf) { </text>
    <text x="826" y="410" fill="#F07178">system</text>
    <text x="904" y="410" fill="#D6DEEB">(buf); }</text>
    <text x="1010" y="410" fill="#F2A6AA">Sink 1</text>
    <text x="510" y="530" fill="#82AAFF">void</text>
    <text x="568" y="530" fill="#F6C177">process_network</text>
    <text x="762" y="530" fill="#D6DEEB">(int sock) {</text>
    <text x="510" y="588" fill="#D6DEEB">memcpy(data.field, recv_buf, 50);</text>
    <text x="1010" y="588" fill="#7F95A2">Propagation</text>
    <text x="510" y="646" fill="#F6C177">strcpy</text>
    <text x="592" y="646" fill="#D6DEEB">(dest, data.field);</text>
    <text x="1010" y="646" fill="#F2A6AA">Sink 2</text>
  </g>
  <rect x="493" y="562" width="422" height="44" rx="12" fill="#1B3040" opacity="0.86"/>
  <rect x="493" y="620" width="320" height="44" rx="12" fill="#4B2027" opacity="0.92"/>
</svg>